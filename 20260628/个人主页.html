<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代码与诗 · 我的小站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 数字雨背景 */
        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.15;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
            text-align: center;
        }

        /* 头像 */
        .avatar {
            width: 120px;
            height: 120px;
            border: 3px solid #00ff88;
            border-radius: 50%;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            background: rgba(0, 255, 136, 0.1);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }

        /* 名字打字机效果 */
        .name {
            font-size: 36px;
            margin-bottom: 10px;
            min-height: 50px;
        }

        .cursor {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* 简介 */
        .bio {
            color: #888;
            font-size: 16px;
            margin-bottom: 40px;
            line-height: 1.8;
        }

        /* 导航卡片 */
        .cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 60px;
        }

        .card {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid #00ff88;
            padding: 25px 40px;
            text-decoration: none;
            color: #00ff88;
            font-size: 18px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            background: rgba(0, 255, 136, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
        }

        .card-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        /* 技能标签 */
        .skills {
            margin-bottom: 40px;
        }

        .skills h3 {
            margin-bottom: 15px;
            color: #00ff88;
        }

        .skill-tags {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            padding: 8px 16px;
            font-size: 14px;
            color: #00ff88;
        }

        /* 页脚 */
        footer {
            color: #444;
            font-size: 14px;
            margin-top: 60px;
        }

        footer a {
            color: #00ff88;
            text-decoration: none;
        }

        /* 社交链接 */
        .social {
            margin-top: 20px;
        }

        .social a {
            color: #00ff88;
            margin: 0 10px;
            text-decoration: none;
            font-size: 20px;
        }

        .social a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <canvas id="matrix-bg"></canvas>
    
    <div class="container">
        <!-- 头像 -->
        <div class="avatar">👨‍💻</div>
        
        <!-- 名字（打字机效果） -->
        <h1 class="name"><span id="typewriter"></span><span class="cursor">|</span></h1>
        
        <!-- 简介 -->
        <p class="bio">
            你好！我是<br>
            一名计算机科学学习者<br>
            热爱编程，热爱技术
        </p>
        
        <!-- 导航卡片 -->
        <div class="cards">
            <a class="card" href="#">
                <div class="card-icon">📝</div>
                <div>博客</div>
            </a>
            <a class="card" href="#">
                <div class="card-icon">👤</div>
                <div>关于我</div>
            </a>
            <a class="card" href="https://github.com" target="_blank">
                <div class="card-icon">🐙</div>
                <div>GitHub</div>
            </a>
        </div>
        
        <!-- 技能 -->
        <div class="skills">
            <h3>我的技能</h3>
            <div class="skill-tags">
                <span class="tag">Python</span>
                <span class="tag">HTML/CSS</span>
                <span class="tag">Git</span>
                <span class="tag">VSCode</span>
            </div>
        </div>
        
        <!-- 页脚 -->
        <footer>
            <p>© 2026 我的个人主页</p>
            <div class="social">
                <a href="#">GitHub</a>
                <a href="#">Email</a>
            </div>
        </footer>
    </div>

    <script>
        // 打字机效果
        const name = "小明";
        const typewriter = document.getElementById('typewriter');
        let i = 0;

        function type() {
            if (i < name.length) {
                typewriter.innerHTML += name.charAt(i);
                i++;
                setTimeout(type, 300);
            }
        }

        // 数字雨背景
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()';
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let i = 0; i < columns; i++) {
            drops[i] = 1;
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#00ff88';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const char = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(char, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 50);

        // 窗口大小改变时重新调整画布
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // 启动打字机
        type();
    </script>
</body>
</html>
